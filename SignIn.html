
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="main.css" rel="stylesheet">
        <title>Signup Form</title>
    </head>
    <body class="signup">

        <h1 class="title"> NOTE|TAKERS </h1>
        <div class="container">

            <div class="my-image">
                <img class="Pad" src="assets/Pad.png" alt="signup image ">
            </div>

            <div class="my-box">
            <h2> Signup </h2>
            <form id="signupForm">  
                <label for="name">UserName:</label><br>
                <input class="textbox" type="text" id="name" name="name"  required><br>
                <label for="email">Email:</label><br>
                <input class="textbox" type="text" id="email" name="email" required><br>
                <label for="password">Password:</label><br>
                <input class="textbox" type="text" id="password" name="password" required><br><br>
                <button type="submit" class="black_button" id="signup">Sign Up</button>
            </form>
            <p> Already have an account? <button><a href="login.html"> Login </a> </button></p>
            </div>

        </div>
        <script type="module" src="SignIn.js"></script>
    </body>
  
</html>
