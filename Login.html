<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login page</title>
        <link rel="stylesheet" href="main.css">
    </head>
    <body class="signup">

 
            <img class="Pad" src="assets/Pad.png" alt="signup image ">
       
     
        <div class="my-box">
        <h2> LogIn </h2>
           
      
            <form id="loginForm">
                <label for="email">Email:</label><br>
                <input class="textbox" type="text" id="email" name="email" required><br>
                <label for="password">Password:</label><br>
                <input class="textbox" type="text" id="password" name="password" required><br><br>
                <button type="submit" class="black_button" id="login">Login</button>
            </form>
            <p> Don't have an account? <button><a href="SignIn.html"> Sign Up </a> </button></p>
            </div>
            <script type="module" src="Login.js"></script>
    </body>

</html>
