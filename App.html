<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Main Page</title>
    <link rel="stylesheet" href="main.css">
</head>

<body class="background">

    <div class="navbar">
        <div>
            <button class="topButton"><a href="Login.html">Login</a></button>
            <button class="topButton"><a href="SignIn.html">Sign up</a></button> 
        </div>
    <h4 id="welcome"> Logged in as:_______ </h4>
    <button id="logoutBtn" class="logoutbtn">Logout</button>
    </div>

    <div class="MainContainer">
        <div class="LeftContainer">
        <div>
            <h2> Modify task #: 
            <select name="#" class="numdropdown">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
            </select></h2> 
        
            <input class="textbox" type="text" name="textbox" required>
            <br>
            <button class="logoutbtn" id="modifyBtn">Modify Task</button>
        </div>
            
        </div>
        <div class="MiddleContainer">
            <h3 class="textbox">INPUT TO DO </h3>
            <input class="textbox" type="text" id="userInput"><br><br>
            
            <div class="toDo_box">
                <h4 class="behind">NOTE|TAKERS</h4>
                    <div>
                        <ul id="todoList">
                           
                    </div>     
            </div>
        </div>

        <div class="RightContainer">
            <button type="submit" class="AddBtn" id="submitBtn">Add To List</button>
        </div>

    </div>
    <script type="module" src="App.js"></script>
   
</body>
</html>
